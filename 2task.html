<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Fun Page</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f8ff;
            margin: 0;
        }

        #animal-name {
            font-size: 4rem;
            color: #2c3e50;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        #animal-name:hover {
            color: #22e3e6;
        }

        #message-area {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #7f8c8d;
            height: 30px;
        }
    </style>
</head>

<body>

    <h1 id="animal-name">Cat</h1>
    <div id="message-area"></div>

    <script src="2task.js"></script>

</body>
</html>
